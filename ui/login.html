<!DOCTYPE html>

<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Huntly - Вхід</title>
    <link rel="stylesheet" href="styles.css">
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'><rect width='32' height='32' rx='8' fill='%237c6fff'/><text x='50%25' y='50%25' dominant-baseline='central' text-anchor='middle' font-size='18' font-weight='bold' fill='white'>H</text></svg>">
</head>
<body class="auth-page">
    <div class="auth-container">
        <div class="auth-logo">
            <h1>Huntly</h1>
            <p>Відстежуй свій пошук роботи</p>
        </div>

        <div class="auth-card">
            <h2>Ласкаво просимо!</h2>

            <div id="error-message" class="error-message hidden"></div>

            <form id="login-form">
                <div class="form-group">
                    <label for="email">Ел. пошта</label>
                    <input type="email" id="email" placeholder="you@example.com" required>
                </div>

                <div class="form-group">
                    <label for="password">Пароль</label>
                    <input type="password" id="password" placeholder="********" required>
                </div>

                <button type="submit" class="btn-primary" id="login-btn">
                    Вхід
                </button>
            </form>

            <p class="auth-link">
                Немає акаунта?
                <a href="register.html">Зареєструватися</a>
            </p>
        </div>
    </div>

    <script src="app.js"></script>

    <script>
        document.getElementById('login-form').addEventListener('submit', async (e) => {
            e.preventDefault();

            const email = document.getElementById('email').value;
            const passwod = document.getElementById('password').value;
            const btn = document.getElementById('login-btn');
            const error = document.getElementById('error-message');

            btn.textContent = 'Завантаження...';
            btn.disabled = true;
            error.classList.add('hidden');

            try {
                const response = await fetch(`${API_URL}/api/auth/login`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email, password: passwod })
                });

                if (!response.ok) {
                    const data = await response.json();
                    throw new Error(data.message || 'Помилка входу');
                }

                const data = await response.json();
                localStorage.setItem('token', data.token);
                localStorage.setItem('user', JSON.stringify({
                    email: data.email,
                    firstName: data.firstName,
                }));

                window.location.href = 'index.html';
            }
            catch (err) {
                error.textContent = err.message;
                error.classList.remove('hidden');
                btn.textContent = 'Вхід';
                btn.disabled = false;
            }
        });
    </script>
</body>
</html>
