<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Huntly — Аналітика</title>
    <link rel="stylesheet" href="styles.css">
    <link rel="icon" href="data:,">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body>
    <div class="app-layout">
        <aside class="sidebar">
            <div class="sidebar-logo">
                <h2>Huntly</h2>
            </div>
            <nav class="sidebar-nav">
                <a class="nav-item" href="index.html">Заявки</a>
                <a class="nav-item" href="companies.html">Компанії</a>
                <a class="nav-item active" href="analytics.html">Аналітика</a>
            </nav>
            <div class="sidebar-user">
                <p>Увійшли як</p>
                <strong id="user-name">...</strong>
                <br>
                <button class="btn-secondary" onclick="logout()" style="width:100%;margin-top:12px">
                    Вийти
                </button>
            </div>
        </aside>

        <main class="main-content">
            <div class="page-header">
                <h1>Аналітика</h1>
            </div>

            <div class="stats-grid" style="margin-bottom:32px">
                <div class="stat-card">
                    <span class="stat-icon">📋</span>
                    <div class="stat-label">Всього заявок</div>
                    <div class="stat-value" id="stat-total">0</div>
                </div>
                <div class="stat-card">
                    <span class="stat-icon">🎤</span>
                    <div class="stat-label">Конверсія в інтерв'ю</div>
                    <div class="stat-value" id="stat-conversion">0%</div>
                </div>
                <div class="stat-card">
                    <span class="stat-icon">💰</span>
                    <div class="stat-label">Середня зарплата від</div>
                    <div class="stat-value" id="stat-avg-salary">—</div>
                </div>
                <div class="stat-card">
                    <span class="stat-icon">🎉</span>
                    <div class="stat-label">Офери</div>
                    <div class="stat-value" id="stat-offers">0</div>
                </div>
            </div>

            <div style="display:grid;grid-template-columns:1fr 1fr;gap:20px;margin-bottom:20px">
                <div class="table-container" style="padding:24px">
                    <h3 style="margin-bottom:20px;font-size:1rem;font-weight:700">
                        Заявки по статусах
                    </h3>
                    <canvas id="statusChart" height="260"></canvas>
                </div>

                <div class="table-container" style="padding:24px">
                    <h3 style="margin-bottom:20px;font-size:1rem;font-weight:700">
                        Розподіл по пріоритету
                    </h3>
                    <canvas id="priorityChart" height="260"></canvas>
                </div>
            </div>

            <div class="table-container" style="padding:24px;margin-bottom:20px">
                <h3 style="margin-bottom:20px;font-size:1rem;font-weight:700">
                    Зарплатні очікування по статусах ($)
                </h3>
                <canvas id="salaryChart" height="120"></canvas>
            </div>

            <div class="table-container" style="padding:24px">
                <h3 style="margin-bottom:20px;font-size:1rem;font-weight:700">
                    Воронка пошуку роботи
                </h3>
                <div id="funnel" style="display:flex;flex-direction:column;gap:8px;max-width:600px;margin:0 auto"></div>
            </div>
        </main>
    </div>

    <script src="app.js"></script>
    <script>
        const CHART_COLORS = {
            purple: '#7c6fff',
            blue:   '#60a5fa',
            green:  '#34d399',
            yellow: '#fbbf24',
            red:    '#f87171',
            gray:   '#6b7280'
        };

        async function loadAnalytics() {
            if (!requireAuth()) return;

            const user = getUser();
            if (user) document.getElementById('user-name').textContent = user.firstName;

            const response = await apiRequest('/api/jobapplications');
            if (!response) return;

            const apps = await response.json();

            renderStats(apps);
            renderStatusChart(apps);
            renderPriorityChart(apps);
            renderSalaryChart(apps);
            renderFunnel(apps);
        }

        function renderStats(apps) {
            const interviews = apps.filter(a =>
                ['PhoneScreen','Technical','Final','Offer','Accepted'].includes(a.status)
            );
            const offers = apps.filter(a => ['Offer','Accepted'].includes(a.status));
            const withSalary = apps.filter(a => a.salaryFrom);
            const avgSalary = withSalary.length
                ? Math.round(withSalary.reduce((s,a) => s + a.salaryFrom, 0) / withSalary.length)
                : null;

            document.getElementById('stat-total').textContent = apps.length;
            document.getElementById('stat-conversion').textContent =
                apps.length ? Math.round(interviews.length / apps.length * 100) + '%' : '0%';
            document.getElementById('stat-avg-salary').textContent =
                avgSalary ? '$' + avgSalary : '—';
            document.getElementById('stat-offers').textContent = offers.length;
        }

        function renderStatusChart(apps) {
            const statusLabels = {
                'Watchlist':'Розгляд','Preparing':'Готуюсь','Applied':'Подав',
                'PhoneScreen':'Дзвінок HR','Technical':'Технічне','Final':'Фінал',
                'Offer':'Офер','Accepted':'Прийнятий','Rejected':'Відмова',
                'Ghosted':'Ігнорують','Withdrawn':'Відмовився'
            };

            const counts = {};
            apps.forEach(a => { counts[a.status] = (counts[a.status] || 0) + 1; });

            const labels = Object.keys(counts).map(k => statusLabels[k] || k);
            const data   = Object.values(counts);
            const colors = [
                '#7a80a0','#60a5fa','#a78bfa','#fbbf24',
                '#fbbf24','#f59e0b','#34d399','#10b981',
                '#f87171','#6b7280','#6b7280'
            ];

            new Chart(document.getElementById('statusChart'), {
                type: 'doughnut',
                data: { labels, datasets: [{ data, backgroundColor: colors, borderWidth: 0 }] },
                options: {
                    plugins: {
                        legend: {
                            position: 'right',
                            labels: { color: '#7a80a0', font: { size: 12 }, padding: 12 }
                        }
                    }
                }
            });
        }

        function renderPriorityChart(apps) {
            const counts = { Low: 0, Medium: 0, High: 0 };
            apps.forEach(a => { if (counts[a.priority] !== undefined) counts[a.priority]++; });

            new Chart(document.getElementById('priorityChart'), {
                type: 'bar',
                data: {
                    labels: ['Низький', 'Середній', 'Високий'],
                    datasets: [{
                        data: [counts.Low, counts.Medium, counts.High],
                        backgroundColor: ['#60a5fa', '#fbbf24', '#f87171'],
                        borderRadius: 8,
                        borderWidth: 0
                    }]
                },
                options: {
                    plugins: { legend: { display: false } },
                    scales: {
                        x: { ticks: { color: '#7a80a0' }, grid: { color: '#1e2540' } },
                        y: {
                            ticks: { color: '#7a80a0', stepSize: 1 },
                            grid: { color: '#1e2540' }
                        }
                    }
                }
            });
        }

        function renderSalaryChart(apps) {
            const statusGroups = {};
            apps.forEach(a => {
                if (a.salaryFrom) {
                    if (!statusGroups[a.status]) statusGroups[a.status] = [];
                    statusGroups[a.status].push(a.salaryFrom);
                }
            });

            const statusLabels = {
                'Watchlist':'Розгляд','Preparing':'Готуюсь','Applied':'Подав',
                'PhoneScreen':'Дзвінок HR','Technical':'Технічне','Final':'Фінал',
                'Offer':'Офер','Accepted':'Прийнятий'
            };

            const labels = Object.keys(statusGroups).map(k => statusLabels[k] || k);
            const data   = Object.keys(statusGroups).map(k => {
                const vals = statusGroups[k];
                return Math.round(vals.reduce((s,v) => s+v, 0) / vals.length);
            });

            new Chart(document.getElementById('salaryChart'), {
                type: 'bar',
                data: {
                    labels,
                    datasets: [{
                        label: 'Середня зарплата від ($)',
                        data,
                        backgroundColor: '#7c6fff',
                        borderRadius: 8,
                        borderWidth: 0
                    }]
                },
                options: {
                    plugins: {
                        legend: { labels: { color: '#7a80a0' } }
                    },
                    scales: {
                        x: { ticks: { color: '#7a80a0' }, grid: { color: '#1e2540' } },
                        y: { ticks: { color: '#7a80a0' }, grid: { color: '#1e2540' } }
                    }
                }
            });
        }

        function renderFunnel(apps) {
            const stages = [
                { label: 'Всього заявок',  statuses: null, color: '#7c6fff' },
                { label: 'Подав заявку',   statuses: ['Applied','PhoneScreen','Technical','Final','Offer','Accepted','Rejected','Ghosted'], color: '#60a5fa' },
                { label: 'Дзвінок HR',     statuses: ['PhoneScreen','Technical','Final','Offer','Accepted'], color: '#fbbf24' },
                { label: 'Технічне',       statuses: ['Technical','Final','Offer','Accepted'], color: '#f59e0b' },
                { label: 'Офер отримано',  statuses: ['Offer','Accepted'], color: '#34d399' },
                { label: 'Прийнятий',      statuses: ['Accepted'], color: '#10b981' }
            ];

            const total = apps.length;
            const funnel = document.getElementById('funnel');

            stages.forEach(stage => {
                const count = stage.statuses
                    ? apps.filter(a => stage.statuses.includes(a.status)).length
                    : total;
                const pct = total ? Math.round(count / total * 100) : 0;

                funnel.innerHTML += `
                    <div style="display:flex;align-items:center;gap:12px">
                        <div style="width:130px;font-size:0.82rem;color:var(--text-secondary);text-align:right">
                            ${stage.label}
                        </div>
                        <div style="flex:1;background:var(--bg-secondary);border-radius:6px;height:32px;overflow:hidden">
                            <div style="
                                width:${pct}%;
                                height:100%;
                                background:${stage.color};
                                border-radius:6px;
                                transition:width 0.8s ease;
                                display:flex;
                                align-items:center;
                                padding-left:10px;
                                font-size:0.82rem;
                                font-weight:700;
                                color:white;
                                min-width:${count > 0 ? '40px' : '0'}
                            ">
                                ${count > 0 ? count : ''}
                            </div>
                        </div>
                        <div style="width:40px;font-size:0.82rem;color:var(--text-secondary)">
                            ${pct}%
                        </div>
                    </div>
                `;
            });
        }

        loadAnalytics();
    </script>
</body>
</html>
