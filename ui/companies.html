<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Huntly — Компанії</title>
    <link rel="stylesheet" href="styles.css">
    <link rel="icon" href="data:,">
</head>
<body>
    <div class="app-layout">
        <aside class="sidebar">
            <div class="sidebar-logo">
                <h2>Huntly</h2>
            </div>
            <nav class="sidebar-nav">
                <a class="nav-item" href="index.html">Заявки</a>
                <a class="nav-item active" href="companies.html">Компанії</a>
                <a class="nav-item" href="analytics.html">Аналітика</a>
            </nav>
            <div class="sidebar-user">
                <p>Увійшли як</p>
                <strong id="user-name">...</strong>
                <br><br>
                <button class="btn-secondary" onclick="logout()" style="width:100%">
                    Вийти
                </button>
            </div>
        </aside>

        <main class="main-content">
            <div class="page-header">
                <h1>Компанії</h1>
                <button class="btn-primary" style="width:auto;padding:10px 20px"
                    onclick="openModal()">
                    + Додати компанію
                </button>
            </div>

            <div class="table-container">
                <table>
                    <thead>
                        <tr>
                            <th>Назва</th>
                            <th>Тип</th>
                            <th>Розмір</th>
                            <th>Сайт</th>
                            <th>LinkedIn</th>
                            <th></th>
                        </tr>
                    </thead>
                    <tbody id="companies-table">
                        <tr>
                            <td colspan="6">
                                <div class="empty-state">
                                    <p>Завантаження...</p>
                                </div>
                            </td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </main>
    </div>

    <div class="modal-overlay" id="modal-overlay">
        <div class="modal">
            <h3>Нова компанія</h3>
            <div id="modal-error" class="error-message hidden"></div>

            <div class="form-group">
                <label>Назва</label>
                <input type="text" id="company-name" placeholder="GlobalLogic">
            </div>
            <div class="form-group">
                <label>Тип</label>
                <select id="company-type">
                    <option value="0">Продукт</option>
                    <option value="1">Аутсорс</option>
                    <option value="2">Аутстаф</option>
                    <option value="3">Стартап</option>
                    <option value="4">Змішаний</option>
                    <option value="5">Невідомо</option>
                </select>
            </div>
            <div class="form-group">
                <label>Розмір</label>
                <select id="company-size">
                    <option value="0">Стартап (до 50)</option>
                    <option value="1">Малий (50–200)</option>
                    <option value="2">Середній (200–1000)</option>
                    <option value="3">Великий (1000+)</option>
                    <option value="4">Невідомо</option>
                </select>
            </div>
            <div class="form-group">
                <label>Сайт</label>
                <input type="url" id="company-website" placeholder="https://...">
            </div>
            <div class="form-group">
                <label>LinkedIn</label>
                <input type="url" id="company-linkedin" 
                    placeholder="https://linkedin.com/company/...">
            </div>
            <div class="form-group">
                <label>Нотатки</label>
                <textarea id="company-notes" rows="3" 
                    placeholder="Враження, особливості..."></textarea>
            </div>

            <div class="modal-footer">
                <button class="btn-secondary" onclick="closeModal()">Скасувати</button>
                <button class="btn-primary" style="width:auto;padding:10px 24px"
                    onclick="createCompany()">
                    Додати
                </button>
            </div>
        </div>
    </div>

    <script src="app.js"></script>
</body>
</html>
