name: CI

on: 
    push:
        branches: [ main ]
    pull_request: 
        branches: [ main ]

jobs:
    build-and-test:
        runs-on: ubuntu-latest

        steps:
          - name: Chechkout code
            uses: actions/checkout@v4
            
          - name: Setup .NET
            uses: actions/setup-dotnet@v4
            with:
                dotnet-version: '8.0.x'

          - name: Restore dependencies
            run: dotnet restore

          - name: Build
            run: dotnet biuld --no-restore --configuration Release

          - name: Tes
            run: dotnet test --no-build --configuration Release --verbosity normal

    docker-build: 
        runs-on: ubuntu-latest
        needs: build-and-test

        steps:
          - name: Checkout code
            uses: actions/checkout@v4

          - name: Build Docker image
            run: docker build -t huntly-api .